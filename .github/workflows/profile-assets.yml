name: Update Profile Assets
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: profile-assets/metrics.svg
          committer_message: "chore: update metrics"
          user: chnithin20
          base: header, activity, community, repositories

  trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: chnithin20
          output_path: profile-assets/trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit trophy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-assets/trophies.svg
          git diff --cached --quiet || git commit -m "chore: update trophies"
          git push
