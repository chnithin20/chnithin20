name: Cache Streak & Trophy Widgets

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily at 4:00 AM UTC
  workflow_dispatch: {}

jobs:
  cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make assets folder
        run: mkdir -p profile-assets

      - name: Download streak stats SVG
        run: |
          curl -sL "https://streak-stats.demolab.com?user=chnithin20&theme=tokyonight&hide_border=true" \
            -o profile-assets/streak.svg

      - name: Download trophies SVG
        run: |
          curl -sL "https://github-profile-trophy.vercel.app/?username=chnithin20&theme=tokyonight&row=1&column=6" \
            -o profile-assets/trophies.svg

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-assets/streak.svg profile-assets/trophies.svg
          git diff --quiet --cached || git commit -m "chore: refresh streak & trophy widgets"
          git push
